services:
  postgres:
    image: postgres:16-alpine
    container_name: etqa-postgres
    environment:
      POSTGRES_USER: etqa
      POSTGRES_PASSWORD: etqa_password
      POSTGRES_DB: etqa_interview_coach
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etqa -d etqa_interview_coach"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

